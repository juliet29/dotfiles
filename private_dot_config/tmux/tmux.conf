# config based on https://juliu.is/a-simple-tmux/


# ── Terminal / colors ──
# Prefer tmux-256color where its terminfo exists, else fall back (RHEL7 host).
if-shell 'infocmp tmux-256color >/dev/null 2>&1' \
  'set -g default-terminal "tmux-256color"' \
  'set -g default-terminal "screen-256color"'
# Advertise 24-bit (truecolor) RGB regardless of the outer terminal's TERM.
# (The old `terminal-overrides ",xterm-256color:RGB"` only fired when the outer
# TERM was exactly xterm-256color, so Ghostty/kitty/alacritty etc. lost truecolor.)
set -as terminal-features ",*:RGB"


set -g mouse on
set -g history-limit 102400
set -g set-clipboard on
set -s copy-command 'pbcopy'

# Forward terminal focus events into tmux so apps inside it (Neovim) receive
# FocusGained/FocusLost — required for auto-reloading files changed on disk.
set -g focus-events on

# window management
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on


# key modes
# Use emacs keybindings in the status line
set-option -g status-keys emacs

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Fix ESC delay in vim
set -g escape-time 10


# Copy Mode
unbind-key -T copy-mode-vi v

bind-key -T copy-mode-vi v \
  send-keys -X begin-selection

bind-key -T copy-mode-vi 'C-v' \
  send-keys -X rectangle-toggle

bind-key -T copy-mode-vi y \
  send-keys -X copy-pipe-and-cancel "pbcopy"

bind-key -T copy-mode-vi MouseDragEnd1Pane \
  send-keys -X copy-pipe-and-cancel "pbcopy"


# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"


# Windows
# New window with the same path
bind t new-window -c '#{pane_current_path}'
# Better window splits
bind '\' split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'


# Break a pane into a new window
bind b break-pane -d
# TODO: navigation




# ── Status line: position + tmux-continuum save state ──
# dotbar owns status-left/right. Put the bar at the bottom, enable its right
# segment, and embed #{continuum_status} (last autosave time, or "off"). These
# MUST be set before dotbar is sourced (dotbar reads @tmux-dotbar-* at load);
# continuum is sourced AFTER dotbar so it can replace #{continuum_status} with
# its script and (re)append its save hook to status-right. Green = saving,
# red bold = off — a visible canary, since the dotbar/continuum tug-of-war over
# status-right is what silently stops autosaves.
# Explicit save interval: continuum saves every 15 min by default, but
# continuum_status.sh reads this option WITHOUT a default, so leaving it unset
# makes the status bar misleadingly show "off". Setting it makes the canary honest.
set -g @continuum-save-interval "15"
set -g @tmux-dotbar-position "bottom"
set -g @tmux-dotbar-right true
# Bake continuum's SAVE hook (invisible) + STATUS display into dotbar's
# status-right text. dotbar OWNS status-right and overwrites it on every (re)load,
# which silently drops continuum's auto-injected save hook — that caused the
# 19:07->20:20 save gap. Embedding the hook in dotbar's own text makes saving
# survive `prefix r` reloads. continuum_save.sh prints nothing (it just runs the
# periodic, timestamp-gated save check); #{continuum_status} is the canary.
set -g @tmux-dotbar-status-right-text " #(~/.config/tmux/plugins/tmux-continuum/scripts/continuum_save.sh)#{continuum_status} %H:%M "
set -g @continuum-status-on-wrap-style "#[fg=green]#{value}#[fg=default]"
set -g @continuum-status-off-wrap-style "#[fg=red,bold]#{value}#[fg=default,nobold]"

if-shell '[ -f ~/.config/tmux/plugins/tmux-dotbar/dotbar.tmux ]' \
  'run ~/.config/tmux/plugins/tmux-dotbar/dotbar.tmux' \
  'set -g @plugin "vaaleyard/tmux-dotbar"; run "tpack init"'

# tmux-resurrect + continuum: persist/restore session layout (windows, panes,
# cwd) so a session survives landing on a different login node or a reboot.
# Save dir defaults to ~/.local/share/tmux/resurrect ($HOME, shared) — correct.
# Container shells are NOT persisted: restored panes return to the host shell
# and `nvc run` is re-run by hand. resurrect must load before continuum.
set -g @continuum-restore 'on'
if-shell '[ -f ~/.config/tmux/plugins/tmux-resurrect/resurrect.tmux ]' \
  'run ~/.config/tmux/plugins/tmux-resurrect/resurrect.tmux'
if-shell '[ -f ~/.config/tmux/plugins/tmux-continuum/continuum.tmux ]' \
  'run ~/.config/tmux/plugins/tmux-continuum/continuum.tmux'
