# config based on https://juliu.is/a-simple-tmux/
set -g mouse on
set -g history-limit 102400
set -g set-clipboard on
set -s copy-command 'pbcopy'

# window management
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on


# key modes
# Use emacs keybindings in the status line
set-option -g status-keys emacs

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Fix ESC delay in vim
set -g escape-time 10


# Copy Mode
unbind-key -T copy-mode-vi v

bind-key -T copy-mode-vi v \
  send-keys -X begin-selection

bind-key -T copy-mode-vi 'C-v' \
  send-keys -X rectangle-toggle

bind-key -T copy-mode-vi y \
  send-keys -X copy-pipe-no-clear "pbcopy"

bind-key -T copy-mode-vi MouseDragEnd1Pane \
  send-keys -X copy-pipe-no-clear "pbcopy"


# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"


# Windows
# New window with the same path
bind t new-window -c '#{pane_current_path}'
# Better window splits
bind '\' split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'


# Break a pane into a new window
bind b break-pane -d
# TODO: navigation




# satatus bar plugin 
set -g @plugin 'vaaleyard/tmux-dotbar'

# Initialize tpack (keep this line at the very bottom of tmux.conf)
run 'tpack init'
